<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var chuva= prompt('Está chovendo? (sim/não)');
        var temperatura= prompt('Temperatura');

        if(chuva!='Sim' && temperatura > '25'){
            document.write ('VAMOS PARA A PRAIA');
        }
        else{
            document.write('OUTRO DESTINO');
        }
    </script>
</body>
</html>
