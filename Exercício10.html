<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var dias = prompt("Digite a quantidade de dias");

        switch (dias) {
            case "28":
                document.write("Fevereriro");
                break;

            case "30":
                document.write("Abril, Junho, Setembro e Novembro");
                break;

            case "31":
                document.write("Janeiro, Março, Maio, Julho, Agosto, Outubro e Dezembro");
                break;

            case "29":
                document.write("Fevereiro em ano bissexto");
                break;

            default:
                document.write("Erro");
        }
    </script>
</body>

</html>
