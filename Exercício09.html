<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício09</title>
</head>
<body>
    <script>
    var nota = prompt("Digite a sua nota (A, B, C, D, E ou F):");

switch (nota /*.toUpperCase()*/) {
    case "A":
        document.write("Excelente");
        break;

    case "B":
        document.write("Ótimo");
        break;

    case "C":
        document.write("Bom");
        break;

    case "D":
        document.write("Regular");
        break;

    case "E":
        document.write("Ruim");
        break;

    case "F":
        document.write("Nos vemos de novo ano que vem...");
        break;

    default:
        document.write("Erro");
}
</script>
</body>
</html>
